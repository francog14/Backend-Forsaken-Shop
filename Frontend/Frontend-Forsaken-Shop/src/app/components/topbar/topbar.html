<header class="topbar">
  <a class="brand" [routerLink]="actor() === 'admin' ? '/admin' : actor() === 'vendedor' ? '/vendedor' : actor() === 'bodeguero' ? '/bodega' : '/tienda'">
    <span class="brand-mark">FS</span>
    <span>Forsaken Shop</span>
  </a>

  <nav class="nav-links" aria-label="Principal">
    @for (link of linksVisibles(); track link.path) {
      <a [routerLink]="link.path" routerLinkActive="active">
        {{ link.label }}
      </a>
    }
  </nav>

  @if (session()) {
    <div class="session-box">
      <span>{{ session()?.rol }}</span>
      <strong>{{ session()?.nombre }}</strong>
      <button type="button" (click)="logout()">Salir</button>
    </div>
  } @else {
    <a class="login-link" routerLink="/login">Iniciar sesion</a>
  }
</header>
